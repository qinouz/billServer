services:
  api:
    build: .
    ports:
      - "8721:8721"
    environment:
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_USERNAME=root
      - DB_PASSWORD=your_password
      - DB_DATABASE=bill_db
      - JWT_SECRET=your_jwt_secret
      - WX_APPID=your_wx_appid
      - WX_SECRET=your_wx_secret
    depends_on:
      - mysql

  mysql:
    image: mysql:8.0
    ports:
      - "3306:3306"
    environment:
      - MYSQL_ROOT_PASSWORD=your_password
      - MYSQL_DATABASE=bill_db
    volumes:
      - mysql_data:/var/lib/mysql

volumes:
  mysql_data:
